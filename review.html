<!DOCTYPE html>
<html lang="en-NZ">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leave a Review | Revtech Automotive, Christchurch</title>
<meta name="description" content="Tell us how we did. Rate your experience with Revtech Automotive in Christchurch.">
<meta name="robots" content="noindex">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%230A0C10'/%3E%3Ctext x='16' y='22' font-family='Arial' font-size='17' font-weight='bold' fill='%2315E0C5' text-anchor='middle'%3ER%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="review-stage">
  <div class="review-card">
    <a href="index.html" class="logo" style="justify-content:center;margin-bottom:8px"><span class="spark">R</span><span>Revtech<small>Automotive · Chch</small></span></a>
    <span class="eyebrow" style="color:var(--accent)">Your feedback</span>
    <h1>How did we do?</h1>
    <p>Tap a star to rate your experience with Revtech Automotive.</p>
    <div class="star-pick" id="stars">
      <button data-rating="1" aria-label="1 star"><svg viewBox="0 0 24 24"><polygon points="12 2 15 9 22 9.3 16.5 14 18.5 21 12 17 5.5 21 7.5 14 2 9.3 9 9"/></svg></button>
      <button data-rating="2" aria-label="2 stars"><svg viewBox="0 0 24 24"><polygon points="12 2 15 9 22 9.3 16.5 14 18.5 21 12 17 5.5 21 7.5 14 2 9.3 9 9"/></svg></button>
      <button data-rating="3" aria-label="3 stars"><svg viewBox="0 0 24 24"><polygon points="12 2 15 9 22 9.3 16.5 14 18.5 21 12 17 5.5 21 7.5 14 2 9.3 9 9"/></svg></button>
      <button data-rating="4" aria-label="4 stars"><svg viewBox="0 0 24 24"><polygon points="12 2 15 9 22 9.3 16.5 14 18.5 21 12 17 5.5 21 7.5 14 2 9.3 9 9"/></svg></button>
      <button data-rating="5" aria-label="5 stars"><svg viewBox="0 0 24 24"><polygon points="12 2 15 9 22 9.3 16.5 14 18.5 21 12 17 5.5 21 7.5 14 2 9.3 9 9"/></svg></button>
    </div>
    <p class="review-hint" id="hint">Select a rating to continue</p>
    <a href="index.html" class="review-back">← Back to site</a>
  </div>
</div>

<script>
  // 4-5 stars -> Google review. 1-3 stars -> private feedback form.
  var GOOGLE_REVIEW_URL = "https://g.page/r/PLACEHOLDER";
  var stars = document.getElementById('stars');
  var hint = document.getElementById('hint');
  var btns = stars.querySelectorAll('button');

  btns.forEach(function (b) {
    b.addEventListener('mouseenter', function () {
      stars.className = 'star-pick lit-' + b.dataset.rating;
    });
    b.addEventListener('click', function () {
      var r = parseInt(b.dataset.rating, 10);
      stars.className = 'star-pick lit-' + r;
      hint.textContent = 'Thanks! Taking you there…';
      setTimeout(function () {
        if (r >= 4) { window.location.href = GOOGLE_REVIEW_URL; }
        else { window.location.href = 'private.html?rating=' + r; }
      }, 450);
    });
  });
  stars.addEventListener('mouseleave', function () { stars.className = 'star-pick'; });
</script>
</body>
</html>
